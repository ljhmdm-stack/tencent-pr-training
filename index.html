<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腾讯公关内容实战课</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #f5f5f7;
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  text-align: center;
  max-width: 480px;
  padding: 40px 24px;
}
h1 {
  font-size: 2em;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(90deg, #f5f5f7 0%, #0071e3 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.subtitle {
  color: #86868b;
  font-size: 0.95em;
  margin-bottom: 48px;
}
input {
  width: 100%;
  padding: 14px 20px;
  background: #1d1d1f;
  border: 1px solid #333;
  border-radius: 12px;
  color: #f5f5f7;
  font-size: 1em;
  outline: none;
  text-align: center;
  letter-spacing: 0.1em;
  transition: border-color 0.2s;
}
input:focus { border-color: #0071e3; }
input::placeholder { color: #555; letter-spacing: 0; }
.error {
  color: #ff453a;
  font-size: 0.85em;
  margin-top: 12px;
  opacity: 0;
  transition: opacity 0.2s;
}
.error.show { opacity: 1; }
.links {
  display: none;
  margin-top: 48px;
}
.links.show { display: block; }
.link-card {
  display: block;
  padding: 20px 24px;
  background: #1d1d1f;
  border: 1px solid #333;
  border-radius: 12px;
  margin-bottom: 16px;
  text-decoration: none;
  color: #f5f5f7;
  transition: border-color 0.2s, background 0.2s;
  text-align: left;
}
.link-card:hover {
  border-color: #0071e3;
  background: #1a1a2e;
}
.link-card .label {
  font-size: 1.2em;
  font-weight: 600;
  margin-bottom: 4px;
}
.link-card .desc {
  color: #86868b;
  font-size: 0.85em;
}
</style>
</head>
<body>
<div class="container">
  <h1>怎么把B端的故事讲出吸引力？</h1>
  <div class="subtitle">腾讯公关内容实战课 · 比比</div>

  <div id="auth-section">
    <input type="password" id="pwd" placeholder="输入访问密码" autofocus>
    <div class="error" id="err">密码错误</div>
  </div>

  <div class="links" id="links">
    <a class="link-card" href="./slides/">
      <div class="label">课件 PPT →</div>
      <div class="desc">全部幻灯片，含动画效果</div>
    </a>
    <a class="link-card" href="./prompt/">
      <div class="label">PR审稿提示词 →</div>
      <div class="desc">企业公关内容审核 + 趣味性评估，可一键复制</div>
    </a>
  </div>
</div>

<script>
const HASH = '3ee9ef93d8dc2b7b4e7c7ec6ab502bc6cbb56d02316ab6d4025e9aae7e466380';
const KEY = 'tencent-pr-auth';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function unlock() {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('links').classList.add('show');
  sessionStorage.setItem(KEY, '1');
}

if (sessionStorage.getItem(KEY) === '1') {
  unlock();
}

document.getElementById('pwd').addEventListener('keydown', async function(e) {
  if (e.key !== 'Enter') return;
  const h = await sha256(this.value);
  if (h === HASH) {
    unlock();
  } else {
    document.getElementById('err').classList.add('show');
    this.value = '';
    setTimeout(() => document.getElementById('err').classList.remove('show'), 2000);
  }
});
</script>
</body>
</html>
